<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Test</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}
.container { max-width: 400px; margin: auto; }
button {
  padding: 12px;
  margin-top: 15px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-size: 16px;
}
input {
  padding: 10px;
  width: 90%;
  margin: 10px;
  border-radius: 8px;
  border: none;
}
.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

<!-- Landing -->
<div id="landing">
  <h2>Only 2% can pass this test 😳</h2>
  <p>நீங்க try பண்ணுவீங்களா? 👇</p>
  <button onclick="show('user')">Start Test</button>
</div>

<!-- User Info -->
<div id="user" class="hidden">
  <h3>Enter Details</h3>
  <input placeholder="Name" id="name"><br>
  <input placeholder="Age" id="age"><br>
  <button onclick="startTest()">Continue</button>
</div>

<!-- Questions -->
<div id="question" class="hidden">
  <h3 id="qText"></h3>
  <button onclick="next(1)">A</button>
  <button onclick="next(2)">B</button>
  <button onclick="next(3)">C</button>
</div>

<!-- Share -->
<div id="share" class="hidden">
  <h3>Result பார்க்க 3 பேருக்கு share பண்ணுங்க 😳👇</h3>
  <button onclick="share()">Share on WhatsApp</button>
</div>

<!-- Loading -->
<div id="loading" class="hidden">
  <h3>Calculating result... ⏳</h3>
</div>

<!-- Result -->
<div id="result" class="hidden">
  <h2 id="resultText"></h2>
  <button onclick="restart()">Try another test</button>
  <button onclick="secondTest()">Compare with friends</button>
</div>

</div>

<script>
let q = 0;
let score = 0;

const questions = [
"2+2 = ?",
"5 x 3 = ?",
"10 / 2 = ?",
"Next: 2,4,6,?",
"Color of sky?"
];

function show(id){
  document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startTest(){
  show('question');
  loadQ();
}

function loadQ(){
  document.getElementById("qText").innerText = questions[q];
}

function next(ans){
  score += ans;
  q++;
  if(q < questions.length){
    loadQ();
  } else {
    show('share');
  }
}

function share(){
  let url = window.location.href;
  window.open(`https://wa.me/?text=Try this IQ test 😳 ${url}`);
  
  setTimeout(()=>{
    show('loading');
    setTimeout(showResult, 3000);
  },2000);
}

function showResult(){
  show('result');
  let text = "";
  if(score > 10) text = "🔥 Genius";
  else if(score > 7) text = "😏 Above Average";
  else text = "😳 Hidden Talent";
  document.getElementById("resultText").innerText = text;
}

function restart(){
  location.reload();
}

function secondTest(){
  alert("Coming soon 😄");
}
</script>

</body>
</html>
